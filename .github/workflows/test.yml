name: Run Tests
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install backend dependencies
      run: pip install -r backend/requirements.txt
    - name: Run maintained backend suites (blocking)
      working-directory: backend
      env:
        JWT_SECRET_KEY: ci-test-secret
      run: pytest tests/ -q

  tsc-report:
    # Non-blocking type-check report (116 known pre-existing errors; burn-down
    # is opportunistic — see docs/ARCHITECTURE.md known quirks).
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - working-directory: frontend
      run: npm ci
    - working-directory: frontend
      run: npx tsc --noEmit | tail -5
